<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8">
    <script defer src="https://analytics.lazyafternoon.site/script.js" data-website-id="bc48993e-2109-4c54-9bbd-c31cc8c643b3"></script>
    <title>RSVP</title>
    <meta name="description" content="">
    <meta name="author" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/ico" href="images/favicon.ico">
    <style>
        .hero-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url("images/goldhill.jpg");
            height: 800px;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        #hidden-content {
            text-align: center;
            margin-top: 150px;
        }

        .hero-text {
            text-align: center;
            position: absolute;
            top: 300px;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
        }

        .hidden {
            visibility: hidden;
        }

        .bold {
            font-weight: bold;
        }

        #formInput:hover {
            color: #0FA0CE;
            background-color: white;
        }

    </style>

</head>
<body>
<div class="container">
    <div class="row">
        <div class="hero-image twelve columns">
            <div id="hidden-content" class="white hidden ">
                <h1>Thanks!</h1>
                <p>Your information has been saved. Talk to Logan if you need to change anything.</p>
            </div>
            <div id="shown-content" class="hero-text">
                <h1>Who Is Coming?</h1>
                <form>
                    <div class="row">
                        <div class="six columns">
                            <label for="name">Your name</label>
                            <input class="u-full-width black" type="text" placeholder="✨"
                                   id="name">
                        </div>
                        <div class="six columns">
                            <label for="plusOnes">Total Number Attending</label>
                            <select class="u-full-width black" id="plusOnes">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">More</option>
                                <option value="0">I Can't Make It</option>
                            </select>
                        </div>
                    </div>
                    <label for="threeSongs">Please list 3 songs you like to dance to:</label>
                    <textarea class="u-full-width black" placeholder="🎶"
                              id="threeSongs"></textarea>
                    <label for="otherConsiderations">Other Considerations?</label>
                    <textarea class="u-full-width black" placeholder="💡"
                              id="otherConsiderations"></textarea>
                    <p class="bold">Please Reply by June 1st, 2023</p>
                    <input id="formInput" class="button white" value="Respondez!">
                </form>

            </div>
        </div>
    </div>
</div>


<script>
    function toggleVisibility() {
        document.getElementById("hidden-content").classList.toggle("hidden")
        document.getElementById("shown-content").classList.toggle("hidden")
    }

    if (document.cookie === "submitted=true") {
        toggleVisibility()
    }

    document.getElementById("formInput").onclick = function () {
        const name = document.getElementById("name").value;
        const plusOnes = document.getElementById("plusOnes").value;
        const threeSongs = document.getElementById("threeSongs").value;
        const otherConsiderations = document.getElementById("otherConsiderations").value;

        const guest = {
            name, plusOnes, threeSongs, otherConsiderations
        }

        console.log(guest);
        document.cookie = "submitted=true;"
        toggleVisibility();
    };
</script>
</body>

</html>
